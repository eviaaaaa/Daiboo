name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  UV_PYTHON: "3.11"

jobs:
  unit:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: daiboo
          POSTGRES_PASSWORD: daiboo_test
          POSTGRES_DB: daiboo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: daiboo_test
      DB_USER: daiboo
      DB_PASSWORD: daiboo_test
      HOST: 127.0.0.1
      PORT: 8801
      DEBUGGING_PORT: 9222
      USER_DATA_DIR: /tmp/daiboo-test-profile
      DAIBOO_LOCAL_EMBEDDINGS: 1
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.11
      - name: Sync locked dependencies
        run: uv sync --locked --group dev
      - name: Enable pgvector extension
        run: PGPASSWORD=daiboo_test psql -h localhost -U daiboo -d daiboo_test -c 'CREATE EXTENSION IF NOT EXISTS vector;'
      - name: Initialize database schema
        run: |
          uv run python - <<'PY'
          from entity import Base
          from entity.rag_document import RagDocument
          from database import engine
          from sqlalchemy import text

          Base.metadata.create_all(engine)
          RagDocument.metadata.create_all(engine)
          with engine.begin() as conn:
              conn.execute(text('CREATE INDEX IF NOT EXISTS ix_rag_documents_parent_id ON rag_documents(parent_id)'))
              conn.execute(text('CREATE INDEX IF NOT EXISTS ix_rag_documents_chunk_level ON rag_documents(chunk_level)'))
          print('Schema initialized')
          PY
      - name: Run unit tests
        run: uv run python -m pytest -q --tb=short

  browser-integration:
    runs-on: ubuntu-latest
    env:
      DEBUGGING_PORT: 9222
      USER_DATA_DIR: /tmp/daiboo-browser-integration-profile
      BROWSER_HEADLESS: "true"
      RUN_BROWSER_INTEGRATION: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Set up Python and locked dependencies
        run: |
          uv python install 3.11
          uv sync --locked --group dev
      - name: Install Chromium
        run: uv run playwright install --with-deps chromium
      - name: Resolve Chromium executable
        run: |
          browser_path="$(uv run python - <<'PY'
          from playwright.sync_api import sync_playwright
          with sync_playwright() as playwright:
              print(playwright.chromium.executable_path)
          PY
          )"
          echo "BROWSER_PATH=$browser_path" >> "$GITHUB_ENV"
      - name: Verify pinned Playwright MCP
        run: npx --yes @playwright/mcp@0.0.78 --version
      - name: Run real browser/MCP integration
        run: >-
          uv run python -m pytest -q --tb=short
          test/test_web_observe.py::test_web_observe_integration_basic
