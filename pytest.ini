[pytest]
asyncio_mode = auto
pythonpath = .
testpaths = test
python_files = test_*.py
norecursedirs = test/manual test/__pycache__
filterwarnings =
    ignore::DeprecationWarning:jieba._compat
    ignore:`langchain-community` is being sunset.*:DeprecationWarning:rag\.document_rag_pgvector
    ignore:pkg_resources is deprecated as an API.*:UserWarning:jieba\._compat
